<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2140"/>
      <stop offset="1" stop-color="#14101f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9c65a"/>
      <stop offset="1" stop-color="#c9a227"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- mini planning grid (background) -->
  <g opacity="0.9">
    <rect x="9" y="9" width="30" height="22" rx="3" fill="#1e1830" stroke="#3a2f57" stroke-width="1.4"/>
    <line x1="9" y1="15.5" x2="39" y2="15.5" stroke="#3a2f57" stroke-width="1"/>
    <line x1="19" y1="9" x2="19" y2="31" stroke="#3a2f57" stroke-width="1"/>
    <line x1="29" y1="9" x2="29" y2="31" stroke="#3a2f57" stroke-width="1"/>
    <!-- scheduled slots -->
    <rect x="10.5" y="17.5" width="7" height="4" rx="1.4" fill="url(#purple)"/>
    <rect x="20.5" y="17.5" width="7" height="4" rx="1.4" fill="url(#gold)"/>
    <rect x="20.5" y="24" width="7" height="4" rx="1.4" fill="url(#purple)"/>
    <rect x="30.5" y="24" width="7" height="4" rx="1.4" fill="url(#gold)"/>
  </g>

  <!-- theatre masks (foreground) -->
  <!-- tragedy mask (back, tilted right) -->
  <g transform="translate(41 40) rotate(10)">
    <path d="M -12,-6 C -12,-16 12,-16 12,-6 C 12,2 8,14 0,14 C -8,14 -12,2 -12,-6 Z"
          fill="url(#gold)" stroke="#14101f" stroke-width="1.4"/>
    <ellipse cx="-5" cy="-4" rx="2.3" ry="3" fill="#221a36"/>
    <ellipse cx="5" cy="-4" rx="2.3" ry="3" fill="#221a36"/>
    <path d="M -5,8 Q 0,2 5,8" fill="none" stroke="#221a36" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- comedy mask (front, tilted left) -->
  <g transform="translate(25 42) rotate(-10)">
    <path d="M -13,-7 C -13,-17 13,-17 13,-7 C 13,2 9,15 0,15 C -9,15 -13,2 -13,-7 Z"
          fill="url(#purple)" stroke="#14101f" stroke-width="1.6"/>
    <ellipse cx="-5.5" cy="-4" rx="2.4" ry="3.1" fill="#1b1430"/>
    <ellipse cx="5.5" cy="-4" rx="2.4" ry="3.1" fill="#1b1430"/>
    <path d="M -6,5 Q 0,12 6,5" fill="none" stroke="#1b1430" stroke-width="2.2" stroke-linecap="round"/>
  </g>
</svg>
