name: Rafraîchir les données & déployer

# Scrape le catalogue complet (dispos/quotas frais) et republie le site sur
# gh-pages — sans intervention. Déclenché automatiquement (cron) ou à la main
# via le bouton "Run workflow".
on:
  schedule:
    - cron: '0 */6 * * *' # toutes les 6 h — catalogue complet (dispos de tout le monde)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gh-pages-publish # partagé avec refresh-favorites pour sérialiser les deploys
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Scrape du catalogue complet
        run: npm run scrape:catalog
      - name: Merge des favoris (garantit leur présence + favorites.json)
        run: npm run scrape:favorites
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /avignon-planner/
      - name: Déploiement sur gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true # une seule commit, pas d'historique qui gonfle
