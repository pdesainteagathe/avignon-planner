name: Rafraîchir les dispos des favoris & déployer

# Léger (~5 s de scrape) : ne rafraîchit que les disponibilités/quotas des
# favoris, à partir du catalogue déjà déployé, puis republie. Assez léger pour
# tourner toutes les 2 h. Le catalogue complet, lui, est rafraîchi 1×/jour par
# refresh.yml.
on:
  schedule:
    - cron: '0 */2 * * *' # toutes les 2 heures
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gh-pages-publish # partagé avec refresh.yml → deploys sérialisés
  cancel-in-progress: false

jobs:
  refresh-favorites:
    runs-on: ubuntu-latest
    env:
      SITE: https://pdesainteagathe.github.io/avignon-planner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Récupérer la data déjà déployée
        run: |
          mkdir -p public
          curl -fsSL "$SITE/catalog.json" -o public/catalog.json
          curl -fsSL "$SITE/favorites.json" -o public/favorites.json
      - name: Rafraîchir les dispos des favoris
        run: |
          IDS=$(node -e "console.log(require('./public/favorites.json').showIds.join(','))")
          node scraper/scrape.mjs availability --ids "$IDS"
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /avignon-planner/
      - name: Déploiement sur gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
